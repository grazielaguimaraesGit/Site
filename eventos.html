<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos JS</title>

    <link rel="stylesheet" href="eventos.css">

    <!--CSS INTERNO-->
    <style>

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            height: 100vh;
            background-color: wheat;

        }

        .btn {

            padding: 15px;
            cursor: pointer;
        }

        .input_cor{
            padding: 15px;
        }
    </style>
</head>
<body>

    <div class="container">

    <button class="btn" id="fundo_preto">Fundo Preto - Cor Branca</button>

    <input type="text"
    placeholder="Digite uma cor"
    id="input_cor"
    class="input_cor"
    >

    <h3>Pedido</h3>
    <select name="pedido" id="pedido">
        <option value="1">Calabresa</option>
        <option value="2">Pizza de quatro queijos</option>
        <option value="3">Pizza de frango com catupiry</option>
        <option value="4">Pizza de Brigadeiro</option>
    </select>


     <p id="paragrafo"></p>
    </div>

   

    
    <script src="eventos.js"></script>
</body>
</html>
