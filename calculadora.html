<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="calculadora.css">
</head>
<body>
   

    <div class="calculadora">

         <h2>Calculadora</h2>

    <input type="text" id="tela">
    
        <div class="caixas">
            <button class="botoes" onclick="cal('numero','1')">1</button>
            <button class="botoes" onclick="cal('numero','2')">2</button>
            <button class="botoes" onclick="cal('numero','3')">3</button>
            <button class="botoes" onclick="cal('outro','+')">+</button>
        </div>

          <div class="caixas">
            <button class="botoes" onclick="cal('numero','4')">4</button>
            <button class="botoes" onclick="cal('numero','5')">5</button>
            <button class="botoes" onclick="cal('numero','6')">6</button>
            <button class="botoes" onclick="cal('outro','-')">-</button>
        </div>

          <div class="caixas">
            <button class="botoes" onclick="cal('numero','7')">7</button>
            <button class="botoes" onclick="cal('numero','8')">8</button>
            <button class="botoes" onclick="cal('numero','9')">9</button>
            <button class="botoes" onclick="cal('outro','*')">X</button>
        </div>

         <div class="caixas">
            <button class="botoes" onclick="cal('numero','0')">0</button>
            <button class="botoes" onclick="cal('outro','.')">.</button>
            <button class="botoes" onclick="cal('outro','/')">/</button>
            <button class="botoes" onclick="cal('outro',',')">,</button>
            <button class="botoes" onclick="cal('outro','del')">del</button>
        </div>

         <div class="caixas">
            <button class="botoes" onclick="cal('outro','expo')">expo</button>
            <button class="botoes" onclick="cal('outro','limpar')">limpar</button>
            <button class="botoes" onclick="cal('outro','=')">=</button>
        </div>

        <script src="calculadora.js"></script>

    </div>
</body>
</html>
