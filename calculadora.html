<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
</head>
<body>
    <h1>Calculadora</h1>

    <input type="text" id="tela">

    <div>
        <div>
            <button onclick="cal('numero','1')">1</button>
            <button onclick="cal('numero','2')">2</button>
            <button onclick="cal('numero','3')">3</button>
            <button onclick="cal('+')">+</button>
        </div>

          <div>
            <button onclick="cal('numero','4')">4</button>
            <button onclick="cal('numero','5')">5</button>
            <button onclick="cal('numero','6')">6</button>
            <button onclick="cal('-')">-</button>
        </div>

          <div>
            <button onclick="cal('numero','7')">7</button>
            <button onclick="cal('numero','8')">8</button>
            <button onclick="cal('numero','9')">9</button>
            <button onclick="cal('*')">X</button>
        </div>

         <div>
            <button onclick="cal('numero','0')">0</button>
            <button onclick="cal('.')">.</button>
            <button onclick="cal('/')">/</button>
            <button onclick="cal(',')">,</button>
            <button onclick="cal('del')">del</button>
        </div>

         <div>
            <button onclick="cal('expo')">expo</button>
            <button onclick="cal('raiz')">raiz</button>
            <button onclick="cal('resto')">resto</button>
            <button onclick="cal('=')">=</button>
        </div>


    </div>
</body>
</html>
